<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#0f0d1a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="amberV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- SQL agent "S" shape — stylized letter mark -->
  <!-- Top bar of S -->
  <rect x="10" y="7" width="13" height="3.5" rx="1.75" fill="url(#amber)"/>
  <!-- Middle bar of S -->
  <rect x="9" y="14.25" width="14" height="3.5" rx="1.75" fill="url(#amber)"/>
  <!-- Bottom bar of S -->
  <rect x="10" y="21.5" width="13" height="3.5" rx="1.75" fill="url(#amber)"/>

  <!-- Left vertical connector (top half) -->
  <rect x="9" y="8.5" width="3" height="7.25" rx="1" fill="url(#amberV)" opacity="0.85"/>
  <!-- Right vertical connector (bottom half) -->
  <rect x="20" y="16.25" width="3" height="7.25" rx="1" fill="url(#amberV)" opacity="0.85"/>

  <!-- Small red diff dot — reconciliation mismatch indicator -->
  <circle cx="27" cy="6" r="3.5" fill="#ef4444"/>
  <rect x="25.8" y="4.8" width="2.4" height="1" rx="0.5" fill="white"/>
  <rect x="26.5" y="4.1" width="1" height="2.4" rx="0.5" fill="white"/>
</svg>
